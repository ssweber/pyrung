site_name: pyrung
site_description: Pythonic PLC simulation engine — write ladder logic in Python, simulate with full debug support.
repo_url: https://github.com/ssweber/pyrung
site_url: https://ssweber.github.io/pyrung/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Learn:
      - learn/index.md
      - The Scan Cycle: learn/scan-cycle.md
      - Tags: learn/tags.md
      - Latch and Reset: learn/latch-reset.md
      - Assignment: learn/assignment.md
      - Timers: learn/timers.md
      - Counters: learn/counters.md
      - State Machines: learn/state-machines.md
      - Branches and OR Logic: learn/branches.md
      - Structured Tags and Blocks: learn/structured-tags.md
      - Testing: learn/testing.md
      - From Simulation to Hardware: learn/hardware.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Core Concepts: getting-started/concepts.md
  - Instruction Reference:
      - instructions/index.md
      - Rungs: instructions/rungs.md
      - Conditions: instructions/conditions.md
      - Coils: instructions/coils.md
      - Timers & Counters: instructions/timers-counters.md
      - Data Movement: instructions/copy.md
      - Math: instructions/math.md
      - Drum, Shift & Search: instructions/drum-shift-search.md
      - Program Control: instructions/program-control.md
      - Communication: instructions/communication.md
  - Guides:
      - Essentials:
        - Execution Engine: guides/runner.md
        - Testing: guides/testing.md
        - Tag Structures: guides/tag-structures.md
      - Declare, Analyze, Commission:
        - Overview: guides/commissioning.md
        - Physical Annotations: guides/physical-harness.md
        - Analysis: guides/analysis.md
        - Verification: guides/verification.md
      - Platform:
        - Click Quickstart: guides/click-quickstart.md
        - Click Cheatsheet: guides/click-cheatsheet.md
        - CircuitPython Quickstart: guides/circuitpy-quickstart.md
      - Tools:
        - VS Code Debugger: guides/dap-vscode.md
        - Architecture: guides/architecture.md
  - Dialects:
      - Click PLC: dialects/click.md
      - Click Python Codegen: dialects/click-codegen.md
      - CircuitPython: dialects/circuitpy.md
      - CircuitPython Modbus TCP: dialects/circuitpy-modbus.md
  - API Reference:
      - Overview: reference/index.md

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_reference.py
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            filters:
              - "!^_"
            heading_level: 2
            inherited_members: false
            members_order: source
            separate_signature: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_source: false
  - llmstxt:
      sections:
        Home:
          - index.md
        Learn:
          - learn/index.md
          - learn/scan-cycle.md
          - learn/tags.md
          - learn/latch-reset.md
          - learn/assignment.md
          - learn/timers.md
          - learn/counters.md
          - learn/state-machines.md
          - learn/branches.md
          - learn/structured-tags.md
          - learn/testing.md
          - learn/hardware.md
        Getting Started:
          - getting-started/installation.md
          - getting-started/quickstart.md
          - getting-started/concepts.md
        Instruction Reference:
          - instructions/index.md
          - instructions/rungs.md
          - instructions/conditions.md
          - instructions/coils.md
          - instructions/timers-counters.md
          - instructions/copy.md
          - instructions/math.md
          - instructions/drum-shift-search.md
          - instructions/program-control.md
          - instructions/communication.md
        Guides — Essentials:
          - guides/runner.md
          - guides/testing.md
          - guides/tag-structures.md
        Guides — Declare, Analyze, Commission:
          - guides/commissioning.md
          - guides/physical-harness.md
          - guides/analysis.md
          - guides/verification.md
        Guides — Platform:
          - guides/click-quickstart.md
          - guides/click-cheatsheet.md
          - guides/circuitpy-quickstart.md
        Guides — Tools:
          - guides/dap-vscode.md
          - guides/architecture.md
        Dialects:
          - dialects/click.md
          - dialects/click-codegen.md
          - dialects/circuitpy.md
          - dialects/circuitpy-modbus.md
        API Reference:
          - reference/index.md
          - reference/api/runtime.md
          - reference/api/data-model.md
          - reference/api/program-structure.md
          - reference/api/instruction-set.md
          - reference/api/click-dialect.md
          - reference/api/circuitpy-dialect.md

exclude_docs: |
  internal/**

not_in_nav: |
  reference/api/**
  CLAUDE.md

markdown_extensions:
  - toc:
      toc_depth: 4
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
